<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Học trực tuyến CNTT</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        /* khung tổng */
        .container {
            display: flex;
        }

        /* menu trái */
        .menu {
            width: 220px;
            background: #ddd;
            height: 100vh;
        }

        /* tiêu đề menu */
        .menu .title {
            background: #888;
            color: white;
            padding: 10px;
            font-weight: bold;
        }

        /* item menu */
        .menu a {
            display: block;
            padding: 10px;
            text-decoration: none;
            color: black;
        }

        .menu a:hover {
            background: #cfcfcf;
        }

        /* nội dung */
        .content {
            padding: 25px;
        }
    </style>

</head>

<body>

    <div class="container">

        <div class="menu">
            <div class="title">Trang chủ</div>
            <a href="#">Khóa học</a>
            <a href="#">Diễn đàn</a>
            <a href="#">Liên hệ</a>
        </div>

        <div class="content">
            <h1>Học trực tuyến Công nghệ thông tin</h1>

            <h3>Các khóa học:</h3>

            <ol>
                <li>Lập trình cơ bản</li>
                <li>Cấu trúc dữ liệu</li>
                <li>Thiết kế web</li>
            </ol>
        </div>

    </div>

</body>

</html>
